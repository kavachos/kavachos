name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build all packages
        run: pnpm build

      - name: Test
        run: pnpm test --filter kavachos -- --exclude tests/timer-test.test.ts --exclude tests/webhook-delivery.test.ts

      - name: Lint and typecheck
        run: pnpm lint && pnpm typecheck

      - name: Publish all packages
        run: |
          for dir in packages/core packages/client packages/cli packages/dashboard packages/react packages/vue packages/svelte packages/ui packages/test-utils packages/expo packages/electron packages/auth/email packages/plugins/telemetry packages/plugins/discovery packages/gateway packages/adapters/hono packages/adapters/express packages/adapters/nextjs packages/adapters/fastify packages/adapters/nuxt packages/adapters/sveltekit packages/adapters/astro packages/adapters/nestjs packages/adapters/solidstart packages/adapters/tanstack packages/adapters/prisma; do
            if [ -d "$dir/dist" ]; then
              echo "Publishing $dir..."
              (cd "$dir" && pnpm publish --access public --no-git-checks 2>&1) || echo "Skipped $dir (already published or error)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

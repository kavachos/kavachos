name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm build
      - run: pnpm test --filter kavachos -- --exclude tests/timer-test.test.ts --exclude tests/webhook-delivery.test.ts

      # Determine npm tag from git tag
      - name: Determine npm tag
        id: npm-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if echo "$TAG" | grep -qE '(alpha|beta|rc|canary|next)'; then
            NPM_TAG=$(echo "$TAG" | grep -oE '(alpha|beta|rc|canary|next)')
            echo "tag=$NPM_TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        run: pnpm -r publish --access public --tag ${{ steps.npm-tag.outputs.tag }} --no-git-checks || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
